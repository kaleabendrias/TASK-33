# ┌──────────────────────────────────────────────────────────────────┐
# │  ServicePlatform — single-command Docker stack                   │
# │                                                                  │
# │  This file ships functional, **non-secret** defaults for every   │
# │  mandatory environment variable so the project boots end-to-end  │
# │  with a single `docker compose up`. No .env file is required —   │
# │  no .env file is read.                                           │
# │                                                                  │
# │  Sensitive values (JWT key, pgAdmin credentials, DB password)    │
# │  are sourced from HOST-INJECTED environment variables using      │
# │  ${VAR:-default} substitution. In production, set those vars in  │
# │  the host shell, systemd unit, K8s Secret, or Docker secret      │
# │  driver — the throwaway defaults are only used when no override  │
# │  is present so local dev still works with `docker compose up`.   │
# │                                                                  │
# │  ⚠ The defaults below are intentionally weak (publishable,       │
# │  reproducible, throwaway) and MUST NOT be reused in production.  │
# └──────────────────────────────────────────────────────────────────┘

services:
  # ── Nginx reverse-proxy ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src:/var/www/html:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network

  # ── PHP-FPM application ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    volumes:
      - ./src:/var/www/html
      - ./unit_tests:/var/www/unit_tests
      - ./API_tests:/var/www/API_tests
    environment:
      # ── Application ────────────────────────────────────────────────
      APP_NAME: "ServicePlatform"
      APP_ENV: "local"
      APP_DEBUG: "false"
      APP_URL: "http://localhost:8080"
      APP_TIMEZONE: "UTC"
      # Throwaway development key — DO NOT REUSE in production.
      APP_KEY: "base64:k8Yh3ARZSN0mLpGqMgWsnFdl+VqTGHMdKNGRPMPUMKo="
      LOG_CHANNEL: "stderr"
      LOG_LEVEL: "warning"
      # ── Database ───────────────────────────────────────────────────
      DB_CONNECTION: "pgsql"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: "service_platform"
      DB_USERNAME: "app_user"
      # Host-injected: export DB_PASSWORD in your shell / orchestrator
      # to override the throwaway dev default.
      DB_PASSWORD: "${DB_PASSWORD:-app_secret_pass}"
      # ── Auth ───────────────────────────────────────────────────────
      # Host-injected: 32-byte HS256 secret. Production MUST override
      # via host env, Docker secret, or orchestrator secret driver.
      JWT_SECRET: "${JWT_SECRET:-Rz8pV3mX7qKjL2wY9sN6dF4hA1cT5gU0}"
      # JWT session policy — tunable without code changes. Defaults
      # mirror the historical hard-coded policy (30m access TTL,
      # 7-day refresh window, 2 concurrent sessions).
      JWT_ACCESS_TTL: "30"
      JWT_REFRESH_TTL: "10080"
      JWT_MAX_SESSIONS: "2"
      # ── Runtime ────────────────────────────────────────────────────
      CACHE_STORE: "file"
      SESSION_DRIVER: "file"
      QUEUE_CONNECTION: "sync"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 && php -r 'exit(0);' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - app-network

  # ── PostgreSQL database ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: "service_platform"
      POSTGRES_USER: "app_user"
      # Host-injected — keep in sync with the app's DB_PASSWORD.
      POSTGRES_PASSWORD: "${DB_PASSWORD:-app_secret_pass}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d service_platform"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  # ── pgAdmin (optional admin tooling) ───────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      # Host-injected: override via PGADMIN_EMAIL / PGADMIN_PASSWORD
      # in your shell, systemd EnvironmentFile, or orchestrator
      # secret driver. The defaults are dev-only and MUST NOT be
      # used in any reachable environment.
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_EMAIL:-admin@local.dev}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:-admin}"
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
