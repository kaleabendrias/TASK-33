# ┌──────────────────────────────────────────────────────────────────┐
# │  ServicePlatform — single-command Docker stack                   │
# │                                                                  │
# │  This file ships functional, **non-secret** defaults for every   │
# │  mandatory environment variable so the project boots end-to-end  │
# │  with a single `docker compose up`. No .env file is required —   │
# │  no .env file is read.                                           │
# │                                                                  │
# │  ⚠ The defaults below are intentionally weak (publishable,       │
# │  reproducible, throwaway) and MUST NOT be reused in production.  │
# │  Production deployments should override every credential at the  │
# │  orchestrator level (Compose env_file, Docker secrets, K8s, …).  │
# └──────────────────────────────────────────────────────────────────┘

services:
  # ── Nginx reverse-proxy ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src:/var/www/html:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network

  # ── PHP-FPM application ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    volumes:
      - ./src:/var/www/html
      - ./unit_tests:/var/www/unit_tests
      - ./API_tests:/var/www/API_tests
    environment:
      # ── Application ────────────────────────────────────────────────
      APP_NAME: "ServicePlatform"
      APP_ENV: "local"
      APP_DEBUG: "false"
      APP_URL: "http://localhost:8080"
      APP_TIMEZONE: "UTC"
      # Throwaway development key — DO NOT REUSE in production.
      APP_KEY: "base64:k8Yh3ARZSN0mLpGqMgWsnFdl+VqTGHMdKNGRPMPUMKo="
      LOG_CHANNEL: "stderr"
      LOG_LEVEL: "warning"
      # ── Database ───────────────────────────────────────────────────
      DB_CONNECTION: "pgsql"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: "service_platform"
      DB_USERNAME: "app_user"
      DB_PASSWORD: "app_secret_pass"
      # ── Auth ───────────────────────────────────────────────────────
      # 32-byte HS256 dev secret — override in real deployments.
      JWT_SECRET: "Rz8pV3mX7qKjL2wY9sN6dF4hA1cT5gU0"
      # ── Runtime ────────────────────────────────────────────────────
      CACHE_STORE: "file"
      SESSION_DRIVER: "file"
      QUEUE_CONNECTION: "sync"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 && php -r 'exit(0);' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - app-network

  # ── PostgreSQL database ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: "service_platform"
      POSTGRES_USER: "app_user"
      POSTGRES_PASSWORD: "app_secret_pass"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d service_platform"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  # ── pgAdmin (optional admin tooling) ───────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@local.dev"
      PGADMIN_DEFAULT_PASSWORD: "admin"
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
